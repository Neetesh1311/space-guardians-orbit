name: Supabase Security Scan

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'scripts/security-scan-gate.mjs'
      - '.github/workflows/supabase-security-scan.yml'
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Supabase migration security gate
        run: node scripts/security-scan-gate.mjs
        env:
          BASE_REF: ${{ github.base_ref }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
